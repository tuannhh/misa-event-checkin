# ============================================================
# Chạy MISA Event Check-in trên hạ tầng nội bộ bằng Docker Compose.
#   docker compose -f docker-compose.internal.yml up -d --build
#   docker compose -f docker-compose.internal.yml logs -f
#   docker compose -f docker-compose.internal.yml down        (giữ dữ liệu)
# Dữ liệu (SQLite + uploads) nằm trong volume "checkin-data" -> không mất khi restart/rebuild.
# ============================================================
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.internal
    image: misa-event-checkin:noibo
    container_name: misa-event-checkin
    ports:
      - "3000:3000"                 # đổi cổng ngoài nếu cần: "8080:3000"
    environment:
      - DATA_DIR=/data
      - PORT=3000
      # ĐỔI chuỗi bí mật này khi chạy thật (ký session đăng nhập):
      - SESSION_SECRET=doi-chuoi-bi-mat-nay-khi-chay-that
      # Nếu gửi email qua Brevo, khai báo URL công khai để ảnh trong email hiển thị được:
      # - BASE_URL=https://checkin.noi-bo.misa.vn
    volumes:
      - checkin-data:/data
    restart: unless-stopped

volumes:
  checkin-data:
